<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed – AI Interviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #eff6ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .error {
      color: #dc2626;
      font-size: 14px;
      margin-top: 12px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <p id="msg" style="color:#64748b;">Confirming your email…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://rolidiycsmwexuolyter.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Rlz8AZZrAekOi0IcgUthTA_Hn_TVyoc";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleConfirm() {
      const card = document.getElementById("card");
      const spinner = document.getElementById("spinner");
      const msg = document.getElementById("msg");

      try {
        // Supabase puts the token in the URL hash as #access_token=...&type=signup
        // or as ?code= for PKCE flow
        const params = new URLSearchParams(window.location.search);
        const hash = new URLSearchParams(window.location.hash.replace("#", ""));

        const code = params.get("code");
        const type = hash.get("type") || params.get("type");
        const accessToken = hash.get("access_token");
        const refreshToken = hash.get("refresh_token");

        let confirmed = false;

        if (code) {
          const { error } = await client.auth.exchangeCodeForSession(code);
          confirmed = !error;
        } else if (accessToken && type === "signup") {
          const { error } = await client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
          confirmed = !error;
        } else if (accessToken) {
          confirmed = true; // token already in URL, Supabase already verified
        }

        spinner.style.display = "none";

        if (confirmed) {
          card.innerHTML = `
            <div class="icon">✅</div>
            <h1>Email Confirmed!</h1>
            <p>Your account is ready. Open the <strong>AI Interviewer</strong> app on your phone and log in.</p>
          `;
        } else {
          card.innerHTML = `
            <div class="icon">⚠️</div>
            <h1>Link Already Used</h1>
            <p>This confirmation link has expired or was already used.</p>
            <p style="margin-top:8px;">Open the app and try signing in — your email may already be confirmed.</p>
          `;
        }
      } catch (e) {
        document.getElementById("spinner").style.display = "none";
        card.innerHTML = `
          <div class="icon">❌</div>
          <h1>Something went wrong</h1>
          <p class="error">${e.message || "Unknown error"}</p>
          <p style="margin-top:12px;">Try opening the app and logging in directly.</p>
        `;
      }
    }

    handleConfirm();
  </script>
</body>
</html>
