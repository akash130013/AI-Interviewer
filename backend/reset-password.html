<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Interview Boat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; }
      .card { background: #1e293b; }
      .label { color: #94a3b8; }
      .title { color: #f1f5f9; }
      .subtitle { color: #64748b; }
      input { background: #0f172a; border-color: #334155; color: #f1f5f9; }
      input:focus { border-color: #3b82f6; }
      input::placeholder { color: #475569; }
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 48px; display: block; margin-bottom: 8px; }
    .title {
      font-size: 22px; font-weight: 700; color: #111;
      text-align: center; margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px; color: #888;
      text-align: center; margin-bottom: 28px; line-height: 1.5;
    }
    .label {
      display: block; font-size: 13px; font-weight: 600;
      color: #333; margin-bottom: 6px; margin-top: 16px;
    }
    input {
      width: 100%; padding: 14px 16px; font-size: 15px;
      border: 1.5px solid #e0e0e0; border-radius: 12px;
      background: #fafafa; color: #111; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #bbb; }
    .btn {
      display: block; width: 100%; margin-top: 24px;
      padding: 16px; font-size: 16px; font-weight: 700;
      color: #fff; background: #111; border: none;
      border-radius: 14px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .alert {
      border-radius: 10px; padding: 12px 14px;
      font-size: 13px; line-height: 1.5; margin-top: 16px;
    }
    .alert-error { background: #fef2f2; color: #dc2626; }
    .alert-success { background: #f0fdf4; color: #16a34a; }
    .alert-info { background: #eff6ff; color: #2563eb; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #form-area, #success-area { display: none; }
    #loading-area { display: block; text-align: center; color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🎙</span>
    </div>
    <h1 class="title">Reset Your Password</h1>

    <div id="loading-area">
      <p class="subtitle">Verifying your reset link…</p>
    </div>

    <div id="form-area">
      <p class="subtitle">Enter a new password for your account.</p>
      <div id="msg"></div>
      <label class="label" for="password">New Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" />
      <label class="label" for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat new password" />
      <button class="btn" id="submit-btn" onclick="handleReset()">Set New Password</button>
    </div>

    <div id="success-area">
      <p class="subtitle" style="margin-top:0">
        Your password has been updated. You can now log in to the Interview Boat app with your new password.
      </p>
      <div class="alert alert-success">✅ Password changed successfully!</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://rolidiycsmwexuolyter.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Rlz8AZZrAekOi0IcgUthTA_Hn_TVyoc';

    const { createClient } = window.supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { detectSessionInUrl: true, persistSession: false },
    });

    function showArea(id) {
      ['loading-area', 'form-area', 'success-area'].forEach(a => {
        document.getElementById(a).style.display = (a === id) ? 'block' : 'none';
      });
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.innerHTML = text ? `<div class="alert alert-${type}">${text}</div>` : '';
    }

    // Supabase fires PASSWORD_RECOVERY when it detects the token in the URL hash/code
    client.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showArea('form-area');
      }
    });

    // Also handle PKCE code param — exchange it for a session
    const code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      client.auth.exchangeCodeForSession(code).then(({ error }) => {
        if (error) {
          showArea('form-area');
          showMsg('Link may have expired. Please request a new reset email.', 'error');
        } else {
          showArea('form-area');
        }
      });
    } else {
      // Give onAuthStateChange 2s to fire before showing expired message
      setTimeout(() => {
        const area = document.getElementById('loading-area');
        if (area.style.display !== 'none') {
          showArea('form-area');
          showMsg('Link may have expired or already been used. Please request a new reset email from the app.', 'error');
        }
      }, 2000);
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      showMsg('', '');

      if (password.length < 8) {
        showMsg('Password must be at least 8 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error'); return;
      }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const { error } = await client.auth.updateUser({ password });
      if (error) {
        showMsg(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      } else {
        showArea('success-area');
      }
    }
  </script>
</body>
</html>
